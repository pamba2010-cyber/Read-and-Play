<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Read & Play! 🌈 A Cheerful Reading Game for Little Kids</title>
<meta name="description" content="A bright reading game for kids preschool to 5th grade. Read the word and tap the picture before the cuddly bear catches you for tickles!">
<meta name="theme-color" content="#FF6BB1">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>🌈</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23FFE5B4'/><text y='80' x='8' font-size='80'>🌈</text></svg>">

<meta property="og:title" content="Read & Play! 🌈 A Reading Game for Little Kids">
<meta property="og:description" content="Race the cuddly bear! Read words, earn stars, level up from preschool to 5th grade.">
<meta property="og:type" content="website">
<meta property="og:locale" content="en_US">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Read & Play! 🌈 A Reading Game for Little Kids">
<meta name="twitter:description" content="Race the cuddly bear and read your way through 5 levels!">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Quicksand', sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background: linear-gradient(180deg, #FFE5B4 0%, #FFB6E1 40%, #B5DEFF 100%);
    position: relative;
  }

  .cloud {
    position: absolute;
    background: white;
    border-radius: 100px;
    opacity: 0.75;
    animation: float 30s infinite linear;
    pointer-events: none;
    z-index: 1;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 { width: 80px; height: 28px; top: 4%; left: -120px; animation-duration: 35s; }
  .cloud-1::before { width: 42px; height: 42px; top: -18px; left: 12px; }
  .cloud-1::after { width: 30px; height: 30px; top: -12px; right: 14px; }

  .cloud-2 { width: 60px; height: 22px; top: 14%; left: -80px; animation-duration: 50s; animation-delay: -18s; }
  .cloud-2::before { width: 30px; height: 30px; top: -10px; left: 8px; }
  .cloud-2::after { width: 22px; height: 22px; top: -7px; right: 8px; }

  @keyframes float {
    from { transform: translateX(0); }
    to { transform: translateX(calc(100vw + 250px)); }
  }

  .game {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 12px 16px 14px;
    position: relative;
    z-index: 2;
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 4px 8px;
  }
  .level-tag {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: white;
    background: #5B4FE4;
    padding: 6px 14px;
    border-radius: 20px;
    box-shadow: 0 3px 0 #3F33B8;
  }
  .home-btn {
    background: white;
    border: none;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(0,0,0,0.15);
  }
  .home-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }

  .top-bar {
    display: flex;
    justify-content: center;
    gap: 7px;
    padding: 4px 0 10px;
  }
  .star-slot {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.45);
    border: 3px solid white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), background 0.3s;
  }
  .star-slot.filled {
    background: #FFD93D;
    transform: scale(1.15) rotate(360deg);
    box-shadow: 0 3px 0 #E8A800, 0 0 18px rgba(255,217,61,0.7);
  }
  .star-slot.filled::after { content: '⭐'; }

  .word-card {
    background: white;
    border-radius: 28px;
    padding: 18px 16px;
    margin-bottom: 14px;
    box-shadow: 0 6px 0 rgba(255,107,177,0.35), 0 10px 24px rgba(0,0,0,0.1);
    text-align: center;
    position: relative;
  }
  .word-card .label {
    font-family: 'Quicksand', sans-serif;
    font-size: 12px;
    color: #FF6BB1;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .word {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(38px, 11vw, 60px);
    color: #5B4FE4;
    letter-spacing: 3px;
    text-transform: lowercase;
    animation: wordPop 0.5s cubic-bezier(.34,1.56,.64,1);
    line-height: 1;
  }
  @keyframes wordPop {
    0% { transform: scale(0.4); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .speaker-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 40px;
    height: 40px;
    background: #FFE5F1;
    border: none;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 3px 0 #FFB6D9;
  }
  .speaker-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #FFB6D9; }

  .choices {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    align-content: center;
    padding-bottom: 8px;
  }
  .choice {
    background: white;
    border: none;
    border-radius: 24px;
    aspect-ratio: 1;
    font-size: clamp(48px, 14vw, 72px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 5px 0 rgba(0,0,0,0.12), 0 6px 14px rgba(0,0,0,0.08);
    transition: transform 0.15s, box-shadow 0.15s;
    animation: choicePop 0.4s cubic-bezier(.34,1.56,.64,1) backwards;
  }
  .choice:nth-child(1) { animation-delay: 0.05s; background: #FFE5B4; }
  .choice:nth-child(2) { animation-delay: 0.15s; background: #C8F7C5; }
  .choice:nth-child(3) { animation-delay: 0.25s; background: #FFD0E8; }
  .choice:nth-child(4) { animation-delay: 0.35s; background: #C5E8FF; }

  @keyframes choicePop {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .choice:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
  .choice:disabled { cursor: default; }
  .choice.correct { animation: correctBounce 0.7s; }
  .choice.wrong { animation: wrongShake 0.5s; }

  @keyframes correctBounce {
    0%, 100% { transform: scale(1); }
    40% { transform: scale(1.3) rotate(8deg); box-shadow: 0 0 40px #FFD93D, 0 5px 0 rgba(0,0,0,0.12); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px) rotate(-3deg); }
    40% { transform: translateX(10px) rotate(3deg); }
    60% { transform: translateX(-8px) rotate(-2deg); }
    80% { transform: translateX(8px) rotate(2deg); }
  }

  /* Bear chase track */
  .chase-track {
    position: relative;
    height: 64px;
    background: linear-gradient(to top, #C8F7C5 0%, #C8F7C5 50%, #B5DEFF 50%, #B5DEFF 100%);
    border-radius: 32px;
    border: 3px solid white;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1), inset 0 -8px 0 rgba(0,0,0,0.05);
    overflow: hidden;
    margin-top: 4px;
  }
  .chase-track::before {
    content: '';
    position: absolute;
    bottom: 8px;
    left: 0;
    right: 0;
    height: 2px;
    background-image: repeating-linear-gradient(to right, rgba(255,255,255,0.7) 0 8px, transparent 8px 16px);
  }
  .bear {
    position: absolute;
    bottom: 4px;
    left: 8px;
    font-size: 38px;
    z-index: 2;
    animation: bearWaddle 0.4s ease-in-out infinite alternate;
  }
  @keyframes bearWaddle {
    from { transform: rotate(-4deg) translateY(0); }
    to { transform: rotate(4deg) translateY(-2px); }
  }
  .kid {
    position: absolute;
    bottom: 4px;
    right: 8px;
    font-size: 38px;
    z-index: 2;
    animation: kidRun 0.3s ease-in-out infinite alternate;
  }
  @keyframes kidRun {
    from { transform: translateY(0) rotate(-3deg); }
    to { transform: translateY(-3px) rotate(3deg); }
  }
  .kid.tickled {
    animation: tickled 0.2s infinite;
  }
  @keyframes tickled {
    0%, 100% { transform: rotate(-12deg) translateY(-2px); }
    50% { transform: rotate(12deg) translateY(-2px); }
  }

  .giggle {
    position: fixed;
    font-size: 30px;
    pointer-events: none;
    animation: giggleFloat 1.8s ease-out forwards;
    z-index: 1000;
  }
  @keyframes giggleFloat {
    0% { transform: translateY(0) scale(0.4); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-140px) scale(1.3); opacity: 0; }
  }

  .bubble {
    position: absolute;
    bottom: 56px;
    right: 8px;
    background: white;
    color: #FF6BB1;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 16px;
    padding: 6px 12px;
    border-radius: 16px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.1);
    opacity: 0;
    transform: scale(0);
    transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
    z-index: 3;
  }
  .bubble.show {
    opacity: 1;
    transform: scale(1);
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -6px;
    right: 16px;
    width: 0;
    height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 8px solid white;
  }

  /* Overlay screens */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    z-index: 10;
    background: linear-gradient(180deg, #FFE5B4 0%, #FFB6E1 40%, #B5DEFF 100%);
  }
  .screen.hidden { display: none; }

  .title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(60px, 17vw, 100px);
    text-align: center;
    line-height: 0.95;
    margin-bottom: 8px;
    text-shadow: 0 4px 0 rgba(0,0,0,0.08);
  }
  .title .l1 { color: #FF6BB1; display: inline-block; transform: rotate(-5deg); }
  .title .l2 { color: #FF9F43; display: inline-block; transform: rotate(3deg); margin: 0 4px; }
  .title .l3 { color: #5B4FE4; display: inline-block; transform: rotate(-2deg); }

  .subtitle {
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    font-size: 19px;
    color: #5B4FE4;
    text-align: center;
    margin: 14px 24px 28px;
    line-height: 1.4;
  }
  .preview {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 36px;
    margin-bottom: 28px;
    background: white;
    padding: 12px 20px;
    border-radius: 30px;
    box-shadow: 0 4px 0 rgba(255,107,177,0.3);
  }
  .preview .arrow {
    font-size: 24px;
    color: #FF6BB1;
    animation: chase 0.8s ease-in-out infinite;
  }
  @keyframes chase {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(6px); }
  }

  .play-btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: white;
    background: linear-gradient(180deg, #FF6BB1, #FF4A9E);
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    cursor: pointer;
    box-shadow: 0 7px 0 #C8388A, 0 10px 24px rgba(255,107,177,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    animation: pulse 1.6s ease-in-out infinite;
  }
  .play-btn:active {
    transform: translateY(4px);
    box-shadow: 0 3px 0 #C8388A, 0 5px 12px rgba(255,107,177,0.4);
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .mascot {
    font-size: 100px;
    animation: bounce 2s ease-in-out infinite;
    margin-bottom: 6px;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-6deg); }
    50% { transform: translateY(-22px) rotate(6deg); }
  }

  .credit {
    position: fixed;
    bottom: 12px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Quicksand', sans-serif;
    font-size: 11px;
    color: #5B4FE4;
    opacity: 0.6;
    letter-spacing: 1px;
    z-index: 11;
  }

  .celebration { text-align: center; }
  .celebration .big-emoji {
    font-size: 130px;
    animation: spin 1s ease-out;
    display: inline-block;
  }
  @keyframes spin {
    from { transform: scale(0) rotate(0deg); }
    to { transform: scale(1) rotate(720deg); }
  }
  .celebration h2 {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(40px, 12vw, 60px);
    color: #FF6BB1;
    margin: 8px 0 6px;
  }
  .celebration .next-level {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #5B4FE4;
    margin-bottom: 4px;
  }
  .celebration p {
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    font-size: 18px;
    color: #5B4FE4;
    margin-bottom: 26px;
  }

  /* Level intro splash */
  .level-splash {
    text-align: center;
    animation: splashIn 0.6s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes splashIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .level-splash .grade-icon { font-size: 90px; margin-bottom: 6px; }
  .level-splash .lvl-num {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 56px;
    color: #FF6BB1;
    line-height: 1;
  }
  .level-splash .lvl-name {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 32px;
    color: #5B4FE4;
    margin: 4px 0 18px;
  }
  .level-splash .lvl-hint {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #FF9F43;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .confetti {
    position: fixed;
    width: 12px;
    height: 12px;
    pointer-events: none;
    z-index: 100;
    animation: confettiFall 3.5s linear forwards;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .trophy-screen .big-emoji { font-size: 140px; }
</style>
</head>
<body>
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>

<!-- Title -->
<div class="screen" id="title-screen">
  <div class="mascot">🌈</div>
  <h1 class="title">
    <span class="l1">Read</span><span class="l2">&amp;</span><span class="l3">Play!</span>
  </h1>
  <p class="subtitle">Read the word, tap the picture.<br>But quick! The bear is coming for tickles!</p>
  <div class="preview">🐻 <span class="arrow">➜</span> 🧒</div>
  <button class="play-btn" onclick="startGame()">Let's Go! ✨</button>
  <div class="credit">Made with love · pambalaw.com</div>
</div>

<!-- Level intro splash -->
<div class="screen hidden" id="level-intro">
  <div class="level-splash">
    <div class="grade-icon" id="grade-icon">🎒</div>
    <div class="lvl-num" id="lvl-num">Level 1</div>
    <div class="lvl-name" id="lvl-name">Preschool</div>
    <div class="lvl-hint">Get ready!</div>
  </div>
</div>

<!-- Celebration after level -->
<div class="screen hidden" id="celebrate-screen">
  <div class="celebration">
    <div class="big-emoji">🎉</div>
    <h2>Amazing!</h2>
    <div class="next-level" id="next-level-msg">Level 2 next!</div>
    <p id="celebrate-msg">You earned 5 stars!</p>
    <button class="play-btn" onclick="continueGame()">Keep Going! ⭐</button>
  </div>
</div>

<!-- Final win -->
<div class="screen hidden trophy-screen" id="champion-screen">
  <div class="celebration">
    <div class="big-emoji">🏆</div>
    <h2>Reading Champion!</h2>
    <p id="champion-msg">You read all 5 levels!</p>
    <button class="play-btn" onclick="restartGame()">Play Again 🌈</button>
  </div>
</div>

<!-- Game -->
<div class="game" id="game-screen" style="display:none;">
  <div class="game-header">
    <div class="level-tag" id="current-level-tag">Preschool</div>
    <button class="home-btn" onclick="restartGame()" aria-label="restart">🏠</button>
  </div>
  <div class="top-bar" id="stars">
    <div class="star-slot"></div>
    <div class="star-slot"></div>
    <div class="star-slot"></div>
    <div class="star-slot"></div>
    <div class="star-slot"></div>
  </div>
  <div class="word-card">
    <div class="label">Read this word</div>
    <div class="word" id="word">cat</div>
    <button class="speaker-btn" onclick="speakWord()" aria-label="hear word">🔊</button>
  </div>
  <div class="choices" id="choices"></div>
  <div class="chase-track">
    <div class="bubble" id="bubble">hahaha!</div>
    <div class="bear" id="bear">🐻</div>
    <div class="kid" id="kid">🧒</div>
  </div>
</div>

<script>
  const LEVELS = [
    {
      name: "Preschool",
      icon: "🍼",
      timeLimit: 16,
      words: [
        { word: 'cat', emoji: '🐱' }, { word: 'dog', emoji: '🐶' },
        { word: 'pig', emoji: '🐷' }, { word: 'cow', emoji: '🐮' },
        { word: 'fox', emoji: '🦊' }, { word: 'bee', emoji: '🐝' },
        { word: 'owl', emoji: '🦉' }, { word: 'sun', emoji: '☀️' },
        { word: 'hat', emoji: '🎩' }, { word: 'bus', emoji: '🚌' },
        { word: 'car', emoji: '🚗' }, { word: 'egg', emoji: '🥚' }
      ]
    },
    {
      name: "Kindergarten",
      icon: "🎒",
      timeLimit: 14,
      words: [
        { word: 'ball', emoji: '⚽' }, { word: 'fish', emoji: '🐟' },
        { word: 'frog', emoji: '🐸' }, { word: 'star', emoji: '⭐' },
        { word: 'cake', emoji: '🍰' }, { word: 'leaf', emoji: '🍃' },
        { word: 'duck', emoji: '🦆' }, { word: 'bear', emoji: '🐻' },
        { word: 'moon', emoji: '🌙' }, { word: 'milk', emoji: '🥛' },
        { word: 'bird', emoji: '🐦' }, { word: 'tree', emoji: '🌳' },
        { word: 'fire', emoji: '🔥' }, { word: 'book', emoji: '📖' },
        { word: 'lion', emoji: '🦁' }, { word: 'boat', emoji: '🚤' }
      ]
    },
    {
      name: "1st & 2nd Grade",
      icon: "📚",
      timeLimit: 13,
      words: [
        { word: 'apple', emoji: '🍎' }, { word: 'snake', emoji: '🐍' },
        { word: 'horse', emoji: '🐴' }, { word: 'sheep', emoji: '🐑' },
        { word: 'panda', emoji: '🐼' }, { word: 'train', emoji: '🚂' },
        { word: 'robot', emoji: '🤖' }, { word: 'ghost', emoji: '👻' },
        { word: 'pizza', emoji: '🍕' }, { word: 'candy', emoji: '🍬' },
        { word: 'cloud', emoji: '☁️' }, { word: 'peach', emoji: '🍑' },
        { word: 'shark', emoji: '🦈' }, { word: 'tiger', emoji: '🐯' },
        { word: 'koala', emoji: '🐨' }, { word: 'whale', emoji: '🐳' },
        { word: 'monkey', emoji: '🐵' }, { word: 'turtle', emoji: '🐢' },
        { word: 'rabbit', emoji: '🐰' }, { word: 'rocket', emoji: '🚀' }
      ]
    },
    {
      name: "3rd Grade",
      icon: "🎨",
      timeLimit: 12,
      words: [
        { word: 'dragon', emoji: '🐉' }, { word: 'cookie', emoji: '🍪' },
        { word: 'guitar', emoji: '🎸' }, { word: 'castle', emoji: '🏰' },
        { word: 'dolphin', emoji: '🐬' }, { word: 'octopus', emoji: '🐙' },
        { word: 'penguin', emoji: '🐧' }, { word: 'peacock', emoji: '🦚' },
        { word: 'mushroom', emoji: '🍄' }, { word: 'balloon', emoji: '🎈' },
        { word: 'anchor', emoji: '⚓' }, { word: 'ladybug', emoji: '🐞' },
        { word: 'popcorn', emoji: '🍿' }, { word: 'hedgehog', emoji: '🦔' },
        { word: 'flamingo', emoji: '🦩' }, { word: 'unicorn', emoji: '🦄' }
      ]
    },
    {
      name: "4th & 5th Grade",
      icon: "🔬",
      timeLimit: 11,
      words: [
        { word: 'elephant', emoji: '🐘' }, { word: 'giraffe', emoji: '🦒' },
        { word: 'butterfly', emoji: '🦋' }, { word: 'kangaroo', emoji: '🦘' },
        { word: 'pineapple', emoji: '🍍' }, { word: 'sandwich', emoji: '🥪' },
        { word: 'snowflake', emoji: '❄️' }, { word: 'crocodile', emoji: '🐊' },
        { word: 'telescope', emoji: '🔭' }, { word: 'helicopter', emoji: '🚁' },
        { word: 'microscope', emoji: '🔬' }, { word: 'basketball', emoji: '🏀' },
        { word: 'skateboard', emoji: '🛹' }, { word: 'ambulance', emoji: '🚑' },
        { word: 'motorcycle', emoji: '🏍️' }, { word: 'hippopotamus', emoji: '🦛' },
        { word: 'caterpillar', emoji: '🐛' }, { word: 'watermelon', emoji: '🍉' },
        { word: 'strawberry', emoji: '🍓' }, { word: 'rhinoceros', emoji: '🦏' }
      ]
    }
  ];

  const STARS_PER_LEVEL = 5;
  const KIDS = ['👧', '👦', '🧒'];

  let state = {
    levelIdx: 0,
    starsInLevel: 0,
    totalStars: 0,
    pool: [],
    currentWord: null,
    timerHandle: null,
    isAnswering: false
  };

  let audioCtx = null;
  const bearEl = () => document.getElementById('bear');
  const kidEl = () => document.getElementById('kid');
  const bubbleEl = () => document.getElementById('bubble');

  function getAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) {}
    }
    return audioCtx;
  }

  function playTone(freq, duration, type = 'sine') {
    try {
      const ctx = getAudio();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    } catch (e) {}
  }

  function happyChime() {
    playTone(523, 0.1);
    setTimeout(() => playTone(659, 0.1), 100);
    setTimeout(() => playTone(784, 0.2), 200);
  }
  function sadBoop() { playTone(220, 0.18, 'sine'); }
  function gigglyTone() {
    [660, 750, 880, 750, 990].forEach((f, i) => {
      setTimeout(() => playTone(f, 0.12, 'triangle'), i * 90);
    });
  }
  function bigCelebration() {
    [523, 659, 784, 1047, 1319].forEach((f, i) => {
      setTimeout(() => playTone(f, 0.18), i * 110);
    });
  }

  function speakWord() {
    if (!state.currentWord) return;
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(state.currentWord.word);
      u.rate = 0.7;
      u.pitch = 1.3;
      window.speechSynthesis.speak(u);
    }
  }

  function startGame() {
    state.levelIdx = 0;
    state.totalStars = 0;
    document.getElementById('title-screen').classList.add('hidden');
    getAudio();
    showLevelIntro();
  }

  function restartGame() {
    clearTimeout(state.timerHandle);
    state.timerHandle = null;
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('celebrate-screen').classList.add('hidden');
    document.getElementById('champion-screen').classList.add('hidden');
    document.getElementById('level-intro').classList.add('hidden');
    document.getElementById('title-screen').classList.remove('hidden');
  }

  function showLevelIntro() {
    const lvl = LEVELS[state.levelIdx];
    document.getElementById('grade-icon').textContent = lvl.icon;
    document.getElementById('lvl-num').textContent = `Level ${state.levelIdx + 1}`;
    document.getElementById('lvl-name').textContent = lvl.name;
    document.getElementById('level-intro').classList.remove('hidden');
    document.getElementById('game-screen').style.display = 'none';

    setTimeout(() => {
      document.getElementById('level-intro').classList.add('hidden');
      enterLevel();
    }, 1800);
  }

  function enterLevel() {
    state.starsInLevel = 0;
    state.pool = [...LEVELS[state.levelIdx].words];
    state.pool.sort(() => Math.random() - 0.5);

    document.querySelectorAll('.star-slot').forEach(s => s.classList.remove('filled'));
    document.getElementById('current-level-tag').textContent = LEVELS[state.levelIdx].name;

    // randomize kid for this level
    const kid = KIDS[Math.floor(Math.random() * KIDS.length)];
    kidEl().textContent = kid;

    document.getElementById('game-screen').style.display = 'flex';
    nextRound();
  }

  function nextRound() {
    if (state.pool.length === 0) {
      state.pool = [...LEVELS[state.levelIdx].words];
      state.pool.sort(() => Math.random() - 0.5);
    }
    state.currentWord = state.pool.pop();
    document.getElementById('word').textContent = state.currentWord.word;

    const allWords = LEVELS[state.levelIdx].words;
    const others = allWords.filter(w => w.word !== state.currentWord.word);
    const distractors = [];
    while (distractors.length < 3 && others.length > distractors.length) {
      const pick = others[Math.floor(Math.random() * others.length)];
      if (!distractors.includes(pick)) distractors.push(pick);
    }
    const choices = [state.currentWord, ...distractors].sort(() => Math.random() - 0.5);

    const container = document.getElementById('choices');
    container.innerHTML = '';
    choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.textContent = c.emoji;
      btn.onclick = () => handleChoice(c, btn);
      container.appendChild(btn);
    });

    state.isAnswering = true;
    startBearChase();
  }

  function startBearChase() {
    const seconds = LEVELS[state.levelIdx].timeLimit;
    const b = bearEl();
    b.style.transition = 'none';
    b.style.left = '8px';
    void b.offsetWidth; // reflow
    b.style.transition = `left ${seconds}s linear`;
    b.style.left = 'calc(100% - 80px)';

    clearTimeout(state.timerHandle);
    state.timerHandle = setTimeout(() => handleCaught(), seconds * 1000);
  }

  function stopBearChase() {
    clearTimeout(state.timerHandle);
    const b = bearEl();
    const currentLeft = window.getComputedStyle(b).left;
    b.style.transition = 'none';
    b.style.left = currentLeft;
    void b.offsetWidth;
    b.style.transition = 'left 0.6s cubic-bezier(.34,1.56,.64,1)';
    b.style.left = '8px';
  }

  function handleChoice(choice, btn) {
    if (!state.isAnswering) return;

    if (choice.word === state.currentWord.word) {
      state.isAnswering = false;
      btn.classList.add('correct');
      happyChime();
      speakWord();
      stopBearChase();

      state.starsInLevel++;
      state.totalStars++;
      const slot = document.querySelectorAll('.star-slot')[state.starsInLevel - 1];
      if (slot) slot.classList.add('filled');

      document.querySelectorAll('.choice').forEach(b => b.disabled = true);

      setTimeout(() => {
        if (state.starsInLevel >= STARS_PER_LEVEL) {
          completeLevel();
        } else {
          nextRound();
        }
      }, 1300);
    } else {
      btn.classList.add('wrong');
      sadBoop();
      setTimeout(() => btn.classList.remove('wrong'), 500);
    }
  }

  function handleCaught() {
    state.isAnswering = false;
    document.querySelectorAll('.choice').forEach(b => b.disabled = true);

    const b = bearEl();
    const k = kidEl();
    const bubble = bubbleEl();

    // bear pounces to overlap with kid
    b.style.transition = 'left 0.25s ease-in';
    b.style.left = 'calc(100% - 76px)';

    k.classList.add('tickled');
    bubble.classList.add('show');
    gigglyTone();
    spawnGiggles();

    setTimeout(() => {
      k.classList.remove('tickled');
      bubble.classList.remove('show');
      // bear retreats
      b.style.transition = 'left 0.6s cubic-bezier(.34,1.56,.64,1)';
      b.style.left = '8px';
      setTimeout(() => nextRound(), 500);
    }, 2000);
  }

  function spawnGiggles() {
    const k = kidEl();
    const rect = k.getBoundingClientRect();
    const emojis = ['😂', '🤣', '😆', '😹'];
    for (let i = 0; i < 10; i++) {
      setTimeout(() => {
        const g = document.createElement('div');
        g.className = 'giggle';
        g.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        g.style.left = (rect.left + Math.random() * rect.width - 10) + 'px';
        g.style.top = rect.top + 'px';
        document.body.appendChild(g);
        setTimeout(() => g.remove(), 1900);
      }, i * 90);
    }
  }

  function completeLevel() {
    document.getElementById('game-screen').style.display = 'none';
    bigCelebration();
    spawnConfetti();

    const isLast = state.levelIdx >= LEVELS.length - 1;
    if (isLast) {
      const champ = document.getElementById('champion-screen');
      document.getElementById('champion-msg').textContent =
        `You read all ${LEVELS.length} levels and earned ${state.totalStars} stars! Wow!`;
      champ.classList.remove('hidden');
    } else {
      const next = LEVELS[state.levelIdx + 1];
      document.getElementById('next-level-msg').textContent = `Next: ${next.name}!`;
      document.getElementById('celebrate-msg').textContent =
        `${state.totalStars} stars so far!`;
      document.getElementById('celebrate-screen').classList.remove('hidden');
    }
  }

  function continueGame() {
    document.getElementById('celebrate-screen').classList.add('hidden');
    state.levelIdx++;
    showLevelIntro();
  }

  function spawnConfetti() {
    const colors = ['#FF6BB1', '#FFD93D', '#5B4FE4', '#4ADE80', '#FF9F43', '#06B6D4'];
    for (let i = 0; i < 70; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = '-20px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = Math.random() * 1.5 + 's';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.transform = `rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }
  }
</script>
</body>
</html>
