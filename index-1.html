<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Read & Play! 🌈 A Cheerful Reading Game for Little Kids</title>
<meta name="description" content="A bright, cheerful sight-word reading game for little kids. Tap the picture that matches the word and earn stars. Free to play.">
<meta name="theme-color" content="#FF6BB1">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>🌈</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23FFE5B4'/><text y='80' x='8' font-size='80'>🌈</text></svg>">

<meta property="og:title" content="Read & Play! 🌈 A Reading Game for Little Kids">
<meta property="og:description" content="Tap the picture that matches the word. Bright, happy, and easy. Made for early readers.">
<meta property="og:type" content="website">
<meta property="og:locale" content="en_US">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Read & Play! 🌈 A Reading Game for Little Kids">
<meta name="twitter:description" content="Tap the picture that matches the word. Bright, happy, and easy.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Quicksand', sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background: linear-gradient(180deg, #FFE5B4 0%, #FFB6E1 40%, #B5DEFF 100%);
    position: relative;
  }

  .cloud {
    position: absolute;
    background: white;
    border-radius: 100px;
    opacity: 0.75;
    animation: float 30s infinite linear;
    pointer-events: none;
    z-index: 1;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 { width: 80px; height: 28px; top: 6%; left: -120px; animation-duration: 35s; }
  .cloud-1::before { width: 42px; height: 42px; top: -18px; left: 12px; }
  .cloud-1::after { width: 30px; height: 30px; top: -12px; right: 14px; }

  .cloud-2 { width: 60px; height: 22px; top: 20%; left: -80px; animation-duration: 50s; animation-delay: -18s; }
  .cloud-2::before { width: 30px; height: 30px; top: -10px; left: 8px; }
  .cloud-2::after { width: 22px; height: 22px; top: -7px; right: 8px; }

  .cloud-3 { width: 70px; height: 24px; top: 13%; left: -100px; animation-duration: 60s; animation-delay: -32s; }
  .cloud-3::before { width: 36px; height: 36px; top: -14px; left: 10px; }
  .cloud-3::after { width: 26px; height: 26px; top: -10px; right: 12px; }

  @keyframes float {
    from { transform: translateX(0); }
    to { transform: translateX(calc(100vw + 250px)); }
  }

  .game {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 18px;
    position: relative;
    z-index: 2;
  }

  .top-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 8px 0 14px;
  }
  .star-slot {
    width: 38px;
    height: 38px;
    background: rgba(255,255,255,0.45);
    border: 3px solid white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), background 0.3s;
  }
  .star-slot.filled {
    background: #FFD93D;
    transform: scale(1.15) rotate(360deg);
    box-shadow: 0 4px 0 #E8A800, 0 0 24px rgba(255,217,61,0.7);
  }
  .star-slot.filled::after { content: '⭐'; }

  .word-card {
    background: white;
    border-radius: 32px;
    padding: 26px 20px;
    margin-bottom: 22px;
    box-shadow: 0 8px 0 rgba(255,107,177,0.35), 0 14px 30px rgba(0,0,0,0.1);
    text-align: center;
    position: relative;
  }
  .word-card .label {
    font-family: 'Quicksand', sans-serif;
    font-size: 14px;
    color: #FF6BB1;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .word {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(50px, 14vw, 76px);
    color: #5B4FE4;
    letter-spacing: 4px;
    text-transform: lowercase;
    animation: wordPop 0.5s cubic-bezier(.34,1.56,.64,1);
    line-height: 1;
  }
  @keyframes wordPop {
    0% { transform: scale(0.4); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .speaker-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 46px;
    height: 46px;
    background: #FFE5F1;
    border: none;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 3px 0 #FFB6D9;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .speaker-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #FFB6D9; }

  .choices {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    align-content: center;
    padding-bottom: 8px;
  }
  .choice {
    background: white;
    border: none;
    border-radius: 28px;
    aspect-ratio: 1;
    font-size: clamp(56px, 17vw, 88px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 0 rgba(0,0,0,0.12), 0 8px 20px rgba(0,0,0,0.08);
    transition: transform 0.15s, box-shadow 0.15s;
    animation: choicePop 0.4s cubic-bezier(.34,1.56,.64,1) backwards;
  }
  .choice:nth-child(1) { animation-delay: 0.05s; background: #FFE5B4; }
  .choice:nth-child(2) { animation-delay: 0.15s; background: #C8F7C5; }
  .choice:nth-child(3) { animation-delay: 0.25s; background: #FFD0E8; }
  .choice:nth-child(4) { animation-delay: 0.35s; background: #C5E8FF; }

  @keyframes choicePop {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .choice:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.12); }
  .choice.correct { animation: correctBounce 0.7s; }
  .choice.wrong { animation: wrongShake 0.5s; }

  @keyframes correctBounce {
    0%, 100% { transform: scale(1); }
    40% { transform: scale(1.35) rotate(10deg); box-shadow: 0 0 50px #FFD93D, 0 6px 0 rgba(0,0,0,0.12); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-12px) rotate(-3deg); }
    40% { transform: translateX(12px) rotate(3deg); }
    60% { transform: translateX(-10px) rotate(-2deg); }
    80% { transform: translateX(10px) rotate(2deg); }
  }

  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    z-index: 10;
    background: linear-gradient(180deg, #FFE5B4 0%, #FFB6E1 40%, #B5DEFF 100%);
  }
  .screen.hidden { display: none; }

  .title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(60px, 17vw, 100px);
    text-align: center;
    line-height: 0.95;
    margin-bottom: 8px;
    text-shadow: 0 4px 0 rgba(0,0,0,0.08);
  }
  .title .l1 { color: #FF6BB1; display: inline-block; transform: rotate(-5deg); }
  .title .l2 { color: #FF9F43; display: inline-block; transform: rotate(3deg); margin: 0 4px; }
  .title .l3 { color: #5B4FE4; display: inline-block; transform: rotate(-2deg); }

  .subtitle {
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    font-size: 20px;
    color: #5B4FE4;
    text-align: center;
    margin: 18px 30px 40px;
    line-height: 1.4;
  }

  .play-btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 30px;
    color: white;
    background: linear-gradient(180deg, #FF6BB1, #FF4A9E);
    border: none;
    border-radius: 50px;
    padding: 18px 54px;
    cursor: pointer;
    box-shadow: 0 8px 0 #C8388A, 0 12px 30px rgba(255,107,177,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    animation: pulse 1.6s ease-in-out infinite;
  }
  .play-btn:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 #C8388A, 0 6px 16px rgba(255,107,177,0.4);
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  .mascot {
    font-size: 110px;
    animation: bounce 2s ease-in-out infinite;
    margin-bottom: 10px;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-6deg); }
    50% { transform: translateY(-22px) rotate(6deg); }
  }

  .credit {
    position: fixed;
    bottom: 12px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Quicksand', sans-serif;
    font-size: 11px;
    color: #5B4FE4;
    opacity: 0.6;
    letter-spacing: 1px;
    z-index: 11;
  }

  .celebration { text-align: center; }
  .celebration .big-emoji {
    font-size: 140px;
    animation: spin 1s ease-out;
    display: inline-block;
  }
  @keyframes spin {
    from { transform: scale(0) rotate(0deg); }
    to { transform: scale(1) rotate(720deg); }
  }
  .celebration h2 {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(44px, 13vw, 64px);
    color: #FF6BB1;
    margin: 12px 0 8px;
  }
  .celebration p {
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    font-size: 22px;
    color: #5B4FE4;
    margin-bottom: 30px;
  }

  .confetti {
    position: fixed;
    width: 12px;
    height: 12px;
    pointer-events: none;
    z-index: 100;
    animation: confettiFall 3.5s linear forwards;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<div class="screen" id="title-screen">
  <div class="mascot">🌈</div>
  <h1 class="title">
    <span class="l1">Read</span><span class="l2">&amp;</span><span class="l3">Play!</span>
  </h1>
  <p class="subtitle">Tap the picture<br>that matches the word!</p>
  <button class="play-btn" onclick="startGame()">Let's Go! ✨</button>
  <div class="credit">Made with love · pambalaw.com</div>
</div>

<div class="screen hidden" id="celebrate-screen">
  <div class="celebration">
    <div class="big-emoji">🎉</div>
    <h2>Amazing!</h2>
    <p id="celebrate-msg">You read 5 words!</p>
    <button class="play-btn" onclick="continueGame()">Keep Going! ⭐</button>
  </div>
</div>

<div class="game" id="game-screen" style="display:none;">
  <div class="top-bar" id="stars">
    <div class="star-slot"></div>
    <div class="star-slot"></div>
    <div class="star-slot"></div>
    <div class="star-slot"></div>
    <div class="star-slot"></div>
  </div>
  <div class="word-card">
    <div class="label">Read this word</div>
    <div class="word" id="word">cat</div>
    <button class="speaker-btn" onclick="speakWord()" aria-label="hear word">🔊</button>
  </div>
  <div class="choices" id="choices"></div>
</div>

<script>
  const WORDS = [
    { word: 'cat',   emoji: '🐱' },
    { word: 'dog',   emoji: '🐶' },
    { word: 'pig',   emoji: '🐷' },
    { word: 'cow',   emoji: '🐮' },
    { word: 'fox',   emoji: '🦊' },
    { word: 'bee',   emoji: '🐝' },
    { word: 'owl',   emoji: '🦉' },
    { word: 'sun',   emoji: '☀️' },
    { word: 'hat',   emoji: '🎩' },
    { word: 'cup',   emoji: '☕' },
    { word: 'bus',   emoji: '🚌' },
    { word: 'car',   emoji: '🚗' },
    { word: 'ball',  emoji: '⚽' },
    { word: 'fish',  emoji: '🐟' },
    { word: 'frog',  emoji: '🐸' },
    { word: 'star',  emoji: '⭐' },
    { word: 'cake',  emoji: '🍰' },
    { word: 'leaf',  emoji: '🍃' },
    { word: 'duck',  emoji: '🦆' },
    { word: 'bear',  emoji: '🐻' },
    { word: 'moon',  emoji: '🌙' },
    { word: 'milk',  emoji: '🥛' },
    { word: 'bird',  emoji: '🐦' },
    { word: 'snake', emoji: '🐍' },
    { word: 'apple', emoji: '🍎' },
    { word: 'tree',  emoji: '🌳' },
  ];

  let score = 0;
  let starsThisRound = 0;
  let currentWord = null;
  let audioCtx = null;

  function getAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) {}
    }
    return audioCtx;
  }

  function playTone(freq, duration, type = 'sine') {
    try {
      const ctx = getAudio();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    } catch (e) {}
  }

  function happyChime() {
    playTone(523, 0.1);
    setTimeout(() => playTone(659, 0.1), 100);
    setTimeout(() => playTone(784, 0.2), 200);
  }

  function sadBoop() { playTone(220, 0.18, 'sine'); }

  function bigCelebration() {
    [523, 659, 784, 1047, 1319].forEach((f, i) => {
      setTimeout(() => playTone(f, 0.18), i * 110);
    });
  }

  function speakWord() {
    if (!currentWord) return;
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(currentWord.word);
      u.rate = 0.7;
      u.pitch = 1.3;
      window.speechSynthesis.speak(u);
    }
  }

  function startGame() {
    document.getElementById('title-screen').classList.add('hidden');
    document.getElementById('game-screen').style.display = 'flex';
    getAudio();
    nextRound();
  }

  function continueGame() {
    document.getElementById('celebrate-screen').classList.add('hidden');
    document.getElementById('game-screen').style.display = 'flex';
    starsThisRound = 0;
    document.querySelectorAll('.star-slot').forEach(s => s.classList.remove('filled'));
    nextRound();
  }

  function nextRound() {
    currentWord = WORDS[Math.floor(Math.random() * WORDS.length)];
    document.getElementById('word').textContent = currentWord.word;

    const others = WORDS.filter(w => w.word !== currentWord.word);
    const distractors = [];
    while (distractors.length < 3) {
      const pick = others[Math.floor(Math.random() * others.length)];
      if (!distractors.includes(pick)) distractors.push(pick);
    }
    const choices = [currentWord, ...distractors].sort(() => Math.random() - 0.5);

    const container = document.getElementById('choices');
    container.innerHTML = '';
    choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.textContent = c.emoji;
      btn.onclick = () => handleChoice(c, btn);
      container.appendChild(btn);
    });
  }

  function handleChoice(choice, btn) {
    if (choice.word === currentWord.word) {
      btn.classList.add('correct');
      happyChime();
      speakWord();
      starsThisRound++;
      score++;
      const slot = document.querySelectorAll('.star-slot')[starsThisRound - 1];
      if (slot) slot.classList.add('filled');

      setTimeout(() => {
        if (starsThisRound >= 5) showCelebration();
        else nextRound();
      }, 1300);
    } else {
      btn.classList.add('wrong');
      sadBoop();
      setTimeout(() => btn.classList.remove('wrong'), 500);
    }
  }

  function showCelebration() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('celebrate-screen').classList.remove('hidden');
    document.getElementById('celebrate-msg').textContent = `You read ${score} words! Wow!`;
    bigCelebration();
    spawnConfetti();
  }

  function spawnConfetti() {
    const colors = ['#FF6BB1', '#FFD93D', '#5B4FE4', '#4ADE80', '#FF9F43', '#06B6D4'];
    for (let i = 0; i < 70; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = '-20px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = Math.random() * 1.5 + 's';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.transform = `rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }
  }
</script>
</body>
</html>
